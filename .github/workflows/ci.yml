name: CI

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - master
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Windows (x64, arm64, ia32) ────────────────────────────────
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
          - i686-pc-windows-msvc
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: npm install
      - run: npm run build:release -- --target ${{ matrix.target }}
      - run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.node'));
            if (files.length === 0) { console.error('No .node files'); process.exit(1); }
            console.log('Files:', files);
            try { const b = require('./' + files[0]); console.log('OK:', Object.keys(b)); }
            catch(e) { console.log('SKIP (cross-compiled):', e.message); }
          "
        name: Smoke test
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ── macOS (x86_64, aarch64) ───────────────────────────────────
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: npm install
      - run: npm run build:release -- --target ${{ matrix.target }}
      - run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.node'));
            if (files.length === 0) { console.error('No .node files'); process.exit(1); }
            console.log('Files:', files);
            try { const b = require('./' + files[0]); console.log('OK:', Object.keys(b)); }
            catch(e) { console.log('SKIP (cross-compiled):', e.message); }
          "
        name: Smoke test
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ── macOS Universal (lipo fat binary) ─────────────────────────
  build-macos-universal:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bindings-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: bindings-aarch64-apple-darwin
      - run: |
          lipo -create -output rs-cross-spawn.darwin-universal.node rs-cross-spawn.darwin-x64.node rs-cross-spawn.darwin-arm64.node
          lipo -info rs-cross-spawn.darwin-universal.node
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-universal-apple-darwin
          path: "*.node"

  # ── Linux (gnu + musl, no riscv64/freebsd) ────────────────────
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          - s390x-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      # ── GNU cross-compiler packages ──────────────────────
      - name: Install aarch64 gcc
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install armv7 gcc
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-linux-gnueabihf
      - name: Install s390x gcc
        if: matrix.target == 's390x-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-s390x-linux-gnu

      # ── Set GNU linker env vars ──────────────────────────
      - name: Set linker (aarch64-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Set linker (armv7-gnu)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER=arm-linux-gnueabihf-gcc" >> $GITHUB_ENV
      - name: Set linker (s390x-gnu)
        if: matrix.target == 's390x-unknown-linux-gnu'
        run: echo "CARGO_TARGET_S390X_UNKNOWN_LINUX_GNU_LINKER=s390x-linux-gnu-gcc" >> $GITHUB_ENV

      # ── x86_64 musl ──────────────────────────────────────
      - name: Install musl-tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # ── Non-x86_64 musl cross-toolchains (via musl.cc) ───
      - name: Download musl-cross (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl -fsSL --retry 5 --retry-delay 10 https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar xz -C /opt
          echo "/opt/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV
      - name: Download musl-cross (armv7)
        if: matrix.target == 'armv7-unknown-linux-musleabihf'
        run: |
          curl -fsSL --retry 5 --retry-delay 10 https://musl.cc/armv7l-linux-musleabihf-cross.tgz | sudo tar xz -C /opt
          echo "/opt/armv7l-linux-musleabihf-cross/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER=armv7l-linux-musleabihf-gcc" >> $GITHUB_ENV

      # ── Build ───────────────────────────────────────────
      - run: npm install
      - run: npm run build:release -- --target ${{ matrix.target }}

      # ── Smoke test ──────────────────────────────────────
      - run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.endsWith('.node'));
            if (files.length === 0) { console.error('No .node files'); process.exit(1); }
            console.log('Files:', files);
            try { const b = require('./' + files[0]); console.log('OK:', Object.keys(b)); }
            catch(e) { console.log('SKIP (cross-compiled):', e.message); }
          "
        name: Smoke test

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ── FreeBSD (VM build) ────────────────────────────────────────
  build-freebsd:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y node npm rust
          run: |
            npm install
            npm run build:release
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-x86_64-unknown-freebsd
          path: "*.node"
          if-no-files-found: error

  # ── Android ───────────────────────────────────────────────────
  build-android:
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Setup Android NDK
        run: |
          curl -fsSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27-linux.zip
          unzip -q ndk.zip && rm ndk.zip
          NDK="$(pwd)/android-ndk-r27"
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV
          echo "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" >> $GITHUB_ENV
          echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang" >> $GITHUB_ENV

      - run: npm install
      - run: npm run build:release -- --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: "*.node"
          if-no-files-found: error

  # ── Publish platform-specific scoped packages ─────────────────
  publish-platforms:
    name: Publish platform packages
    needs:
      - build-windows
      - build-macos
      - build-macos-universal
      - build-linux
      - build-freebsd
      - build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bindings-*
          merge-multiple: true

      - name: Publish each platform binding as @rs-cross-spawn/<triple>
        run: |
          for f in artifacts/*.node; do
            triple="${f#*rs-cross-spawn.}"
            triple="${triple%.node}"
            pkgdir="pkg/$triple"
            mkdir -p "$pkgdir"
            cp "$f" "$pkgdir/rs-cross-spawn.node"

            node -e "
              const m = {
                'win32-x64-msvc':      { os: 'win32', cpu: 'x64' },
                'win32-arm64-msvc':    { os: 'win32', cpu: 'arm64' },
                'win32-ia32-msvc':     { os: 'win32', cpu: 'ia32' },
                'darwin-x64':          { os: 'darwin', cpu: 'x64' },
                'darwin-arm64':        { os: 'darwin', cpu: 'arm64' },
                'darwin-universal':    { os: 'darwin' },
                'linux-x64-gnu':       { os: 'linux', cpu: 'x64' },
                'linux-x64-musl':      { os: 'linux', cpu: 'x64' },
                'linux-arm64-gnu':     { os: 'linux', cpu: 'arm64' },
                'linux-arm64-musl':    { os: 'linux', cpu: 'arm64' },
                'linux-arm-gnueabihf': { os: 'linux', cpu: 'arm' },
                'linux-arm-musleabihf':{ os: 'linux', cpu: 'arm' },
                'linux-s390x-gnu':     { os: 'linux', cpu: 's390x' },
                'freebsd-x64':         { os: 'freebsd', cpu: 'x64' },
                'android-arm64':       { os: 'android', cpu: 'arm64' },
                'android-arm-eabi':    { os: 'android', cpu: 'arm' },
              }['$triple'];
              const pkg = {
                name: '@rs-cross-spawn/$triple',
                version: process.env.REF_NAME.replace(/^v/, ''),
                main: 'rs-cross-spawn.node',
                license: 'MIT',
                os: [m.os],
                cpu: m.cpu ? [m.cpu] : undefined,
              };
              require('fs').writeFileSync('$pkgdir/package.json', JSON.stringify(pkg, null, 2));
            "
            (cd "$pkgdir" && npm publish --access public)
          done
        env:
          REF_NAME: ${{ github.ref_name }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish main rs-cross-spawn package (metadata only) ───────
  publish-main:
    name: Publish main package
    needs: publish-platforms
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"
          if-no-files-found: error
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
